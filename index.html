<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0b10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Leo Saúde"/>
<link rel="manifest" href="manifest.json"/>
<title>Leo Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0b10;--bg2:#14141c;--bg3:#1e1e2a;--bg4:#272735;
  --a:#00e5a0;--a2:#00b8ff;--a3:#ff6b6b;--aw:#ffb347;--ap:#b085f5;
  --t:#f0f0f8;--t2:#8888a8;--t3:#55556a;--br:#28283a;
  --r:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Syne',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}
/* TOP */
.topbar{padding:calc(var(--st) + 14px) 18px 12px;background:var(--bg);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.tt{font-size:15px;font-weight:700}
.td{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.tlogo{width:30px;height:30px;background:var(--a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#000;font-family:'DM Mono',monospace}
/* SCROLL */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 85px)}
/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--br);display:flex;padding-bottom:var(--sb);z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border:none;background:transparent;cursor:pointer;color:var(--t3);transition:color .15s}
.nb.act{color:var(--a)}
.nb svg{width:20px;height:20px;stroke-width:1.8}
.nb span{font-size:9px;font-family:'DM Mono',monospace}
/* PAGE */
.page{display:none;padding:14px}
.page.act{display:block}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ct{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* METRICS */
.m2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.m4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.met{background:var(--bg3);border-radius:10px;padding:12px 10px;border:1px solid var(--br)}
.mv{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1}
.mu{font-size:10px;color:var(--t3);margin-left:1px}
.ml{font-size:10px;color:var(--t2);margin-top:4px}
.ms{font-size:10px;color:var(--t3);margin-top:1px}
.ca .mv{color:var(--a)}.cb .mv{color:var(--a2)}.cw .mv{color:var(--aw)}.cr .mv{color:var(--a3)}.cp .mv{color:var(--ap)}
/* PROGRESS */
.pb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;transition:width .5s}
/* BIG INPUT */
.biw{background:var(--bg3);border:1px solid var(--br);border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center}
.bip{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:50px;font-weight:500;color:var(--a);width:100%;text-align:center;-moz-appearance:textfield}
.bip::-webkit-outer-spin-button,.bip::-webkit-inner-spin-button{-webkit-appearance:none}
.bip::placeholder{color:var(--t3)}
.bil{font-size:11px;color:var(--t3);margin-bottom:6px;font-family:'DM Mono',monospace}
.biu{font-size:14px;color:var(--t3);margin-top:3px}
/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.bp{background:var(--a);color:#000}
.bs{background:var(--bg3);color:var(--t);border:1px solid var(--br);margin-top:6px}
/* BADGE */
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:500}
.bg{background:rgba(0,229,160,.12);color:var(--a)}
.bb{background:rgba(0,184,255,.12);color:var(--a2)}
.br2{background:rgba(255,107,107,.12);color:var(--a3)}
.bw{background:rgba(255,179,71,.12);color:var(--aw)}
.bpp{background:rgba(176,133,245,.12);color:var(--ap)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:6px 6px;color:var(--t3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--br)}
.tbl td{padding:7px 6px;border-bottom:1px solid var(--br);color:var(--t);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
/* SECTION HDR */
.sh{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:14px 0 7px;padding:0 2px}
/* IMC BAR */
.imcbar{height:10px;border-radius:5px;display:flex;overflow:hidden;margin:8px 0;position:relative}
/* ALERT */
.ali{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--br)}
.ali:last-child{border-bottom:none}
.alt{font-family:'DM Mono',monospace;font-size:11px;color:var(--a);min-width:50px;font-weight:500;padding-top:2px;flex-shrink:0}
.aln .ti{font-size:13px;color:var(--t);font-weight:600}
.aln .sw{font-size:11px;color:var(--t3);margin-top:2px}
/* CHECKLIST */
.chi{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--br);cursor:pointer}
.chi:last-child{border-bottom:none}
.chb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--br);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chb.dn{background:var(--a);border-color:var(--a)}
.chl{font-size:13px;color:var(--t);line-height:1.4}
.chl.dn{color:var(--t3);text-decoration:line-through}
.chs{font-family:'DM Mono',monospace;font-size:10px;color:var(--a2);margin-top:1px}
.chn{font-size:11px;color:var(--t3);margin-top:1px}
/* PHASE TABS */
.ptabs{display:flex;gap:5px;margin-bottom:10px}
.pt{flex:1;padding:7px 3px;border-radius:8px;border:1px solid var(--br);background:var(--bg3);text-align:center;cursor:pointer;font-size:10px;font-weight:600;color:var(--t3);transition:all .15s;font-family:'DM Mono',monospace}
.pt.act{background:var(--a);color:#000;border-color:var(--a)}
/* TRAIN SELECTOR */
.tsel{display:flex;gap:7px;overflow-x:auto;padding-bottom:7px;margin-bottom:10px;scrollbar-width:none}
.tsel::-webkit-scrollbar{display:none}
.tc{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid var(--br);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);transition:all .15s;white-space:nowrap}
.tc.act{background:var(--a2);color:#000;border-color:var(--a2)}
/* TAB PILLS */
.tpills{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tpills::-webkit-scrollbar{display:none}
.tpill{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--br);background:var(--bg3);cursor:pointer;font-size:11px;font-weight:600;color:var(--t3);transition:all .15s;white-space:nowrap}
.tpill.act{background:var(--a);color:#000;border-color:var(--a)}
/* HIST */
.hi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--br)}
.hi:last-child{border-bottom:none}
.hd{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)}
.hw{font-family:'DM Mono',monospace;font-size:17px;color:var(--t);font-weight:500}
.hdl{font-family:'DM Mono',monospace;font-size:11px}
/* MEAL */
.mr{padding:9px 0;border-bottom:1px solid var(--br)}
.mr:last-child{border-bottom:none}
.mtime{font-family:'DM Mono',monospace;font-size:10px;color:var(--a);margin-bottom:2px}
.mname{font-size:13px;font-weight:600;color:var(--t)}
.mdesc{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.5}
.mkcal{font-family:'DM Mono',monospace;font-size:11px;color:var(--aw);margin-top:3px}
/* AVOID */
.avi{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--br);font-size:12px;color:var(--t3)}
.avi:last-child{border-bottom:none}
/* MACRO BAR */
.mbw{margin-bottom:8px}
.mbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.mbn{color:var(--t2)}.mbv{font-family:'DM Mono',monospace;color:var(--t3)}
/* SUPP */
.si{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--br)}
.si:last-child{border-bottom:none}
.sn{font-size:12px;color:var(--t);font-weight:600}
.sd{font-size:10px;color:var(--t3);margin-top:2px}
.sdose{font-family:'DM Mono',monospace;font-size:11px;color:var(--a2);text-align:right;flex-shrink:0;margin-left:8px;padding-top:2px}
/* TOAST */
.toast{position:fixed;top:calc(var(--st) + 66px);left:50%;transform:translateX(-50%) translateY(-16px);background:var(--bg3);border:1px solid var(--a);color:var(--a);padding:9px 18px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* RESP BREATH */
.bcirc{width:120px;height:120px;border-radius:50%;border:3px solid var(--a);display:flex;align-items:center;justify-content:center;flex-direction:column;margin:16px auto;transition:transform 1s,border-color 1s;background:rgba(0,229,160,.06)}
.bcirc.expand{transform:scale(1.3);border-color:var(--a2);background:rgba(0,184,255,.08)}
.bcirc.hold{border-color:var(--ap);background:rgba(176,133,245,.08)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div><div class="tt">Leo Saúde 💪</div><div class="td" id="topdate"></div></div>
    <div class="tlogo">L</div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav">
    <button class="nb act" onclick="go('home')" id="nv-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Início</span>
    </button>
    <button class="nb" onclick="go('log')" id="nv-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Registrar</span>
    </button>
    <button class="nb" onclick="go('treino')" id="nv-treino">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16M2 9l2 3-2 3M22 9l-2 3 2 3"/></svg><span>Treino</span>
    </button>
    <button class="nb" onclick="go('nutri')" id="nv-nutri">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span>Nutrição</span>
    </button>
    <button class="nb" onclick="go('mais')" id="nv-mais">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>Mais</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ======= CONSTANTS =======
const PI=94, AL=1.79, PM=78, DI='2026-05-18';
const TMB=1897, TDEE=2466;

// ======= STATE =======
let S={logs:[],ph:0,tr:'A',nt:'treino',st:'alertas',sE:0,sS:0};
function ls(){try{const s=localStorage.getItem('lv4');if(s)S={...S,...JSON.parse(s)}}catch(e){}}
function ss(){localStorage.setItem('lv4',JSON.stringify(S))}
ls();

// ======= HELPERS =======
function td(){return new Date().toISOString().slice(0,10)}
function fd(d){return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
function imc(p){return (p/(AL*AL)).toFixed(1)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function lp(){const l=S.logs.length?S.logs[S.logs.length-1]:null;return l?l.peso:PI}
function wk(){return Math.min(12,Math.max(1,Math.ceil((new Date()-new Date(DI))/(7*864e5))))}
function dayT(){const d=new Date().getDay();return{0:'rest',1:'treino',2:'natacao',3:'rest',4:'treino',5:'treino',6:'bicicleta'}[d]}
function dayKcal(){const t=dayT();if(t==='rest')return{k:1750,l:'Descanso',c:'var(--t3)'};if(t==='bicicleta')return{k:1900,l:'Bicicleta (Sábado)',c:'var(--ap)'};return{k:1950,l:'Treino / Natação',c:'var(--a)'}}

// ======= NAV =======
let CP='home';
function go(p){CP=p;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));document.getElementById('nv-'+p).classList.add('act');render()}

// ======= RENDER =======
function render(){
  document.getElementById('topdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  const c=document.getElementById('content');
  if(CP==='home')c.innerHTML=rHome();
  else if(CP==='log')c.innerHTML=rLog();
  else if(CP==='treino')c.innerHTML=rTreino();
  else if(CP==='nutri')c.innerHTML=rNutri();
  else if(CP==='mais')c.innerHTML=rMais();
  attachEv();
}

// ======= HOME =======
function rHome(){
  const peso=lp(), iv=parseFloat(imc(peso));
  const perd=Math.max(0,Math.round((PI-peso)*10)/10);
  const pct=Math.min(100,Math.round(perd/(PI-PM)*100));
  const sem=wk(), sp=Math.round(sem/12*100);
  const ip=Math.min(98,Math.max(2,((iv-16)/(40-16))*100));
  const di=dayKcal();
  const logs=S.logs.slice(-5).reverse();
  const h=new Date().getHours();

  // day alerts
  const alls=[
    {h:6,t:'06:00',ti:'💧 500ml água em jejum',w:'Hidratação + Gota'},
    {h:7,t:'07:00',ti:'🥚 Café da manhã proteico',w:'3 ovos + pão integral + fruta (~380 kcal)'},
    {h:7,t:'07:30',ti:'💊 Vit D3 (2.000UI) + Vit C (500mg)',w:'Com alimento, absorção ideal'},
    {h:10,t:'10:00',ti:'🧘 Pausa ativa 8 min',w:'Lombar, postura — a cada 50min no trabalho'},
    {h:10,t:'10:05',ti:'💧 300ml água',w:'Hidratação contínua — Gota'},
    {h:13,t:'13:00',ti:'🥗 Almoço completo',w:'Não pular — base da dieta'},
    {h:14,t:'14:00',ti:'☕ Última cafeína',w:'Meia-vida 6h — após esse horário prejudica sono'},
    {h:15,t:'15:00',ti:'🧘 2ª pausa ativa',w:'Circulação, concentração'},
    {h:19,t:'19:30',ti:'🍽️ Jantar leve e proteico',w:'Anabolismo noturno'},
    {h:21,t:'21:00',ti:'📵 Telas modo noite',w:'Melatonina protegida'},
    {h:21,t:'21:30',ti:'🛁 Banho morno 10 min',w:'Queda de temp. corporal → sono fácil'},
    {h:22,t:'22:00',ti:'💊 Magnésio 300mg + respiração 4-7-8',w:'Parassimpático, relaxamento muscular'},
    {h:22,t:'22:30',ti:'🌙 Luzes apagadas — dormir',w:'Meta: 7h30 (23:00 → 06:30)'},
  ];
  const prox=alls.filter(a=>a.h>=h-1).slice(0,4);

  return`<div class="page act">
  <div class="m2">
    <div class="met ca"><div class="mv">${peso.toFixed(1)}<span class="mu">kg</span></div><div class="ml">Peso atual</div><div class="ms">Meta: ${PM} kg</div><div class="pb"><div class="pf" style="width:${100-pct}%;background:var(--a)"></div></div></div>
    <div class="met ${iv>=30?'cr':iv>=25?'cw':'ca'}"><div class="mv">${iv}</div><div class="ml">IMC</div><div class="ms">${iv>=30?'Obesidade':iv>=25?'Sobrepeso':'Normal'} → meta &lt;25</div></div>
    <div class="met ca"><div class="mv">${perd.toFixed(1)}<span class="mu">kg</span></div><div class="ml">Perdido</div><div class="ms">${pct}% da meta</div></div>
    <div class="met cb"><div class="mv">${Math.max(0,peso-PM).toFixed(1)}<span class="mu">kg</span></div><div class="ml">Faltam</div><div class="ms">Sem ${sem}/12</div></div>
  </div>

  <div class="card">
    <div class="ct">Progresso — 12 semanas</div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:3px"><span>${PI} kg → ${PM} kg</span><span>${pct}%</span></div>
    <div class="pb" style="height:9px"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--a2),var(--a))"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin:8px 0 3px"><span>Semana ${sem} de 12</span><span>${sp}%</span></div>
    <div class="pb"><div class="pf" style="width:${sp}%;background:var(--a2)"></div></div>
  </div>

  <div class="card">
    <div class="ct">IMC — escala</div>
    <div class="imcbar">
      <div style="flex:2;background:#00b8ff;opacity:.65"></div>
      <div style="flex:3;background:#00e5a0;opacity:.75"></div>
      <div style="flex:2.5;background:#ffb347;opacity:.8"></div>
      <div style="flex:2.5;background:#ff6b6b;opacity:.75"></div>
      <div style="position:absolute;top:-3px;width:4px;height:16px;background:var(--t);border-radius:2px;left:${ip}%;transform:translateX(-50%)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3)"><span>Baixo</span><span style="color:var(--a)">Normal</span><span style="color:var(--aw)">Sobrepeso←</span><span style="color:var(--a3)">Obeso</span></div>
  </div>

  <div class="card">
    <div class="ct">Hoje — ${new Date().toLocaleDateString('pt-BR',{weekday:'long'})}</div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br)"><span style="font-size:12px;color:var(--t2)">Tipo de dia</span><span class="badge ${di.l.includes('Refeed')?'bw':di.l.includes('Descanso')?'bpp':'bg'}">${di.l}</span></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br)"><span style="font-size:12px;color:var(--t2)">Meta calórica</span><span style="font-family:'DM Mono',monospace;font-size:13px;color:${di.c}">${di.k} kcal</span></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0"><span style="font-size:12px;color:var(--t2)">Água mínima</span><span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--a2)">3,5 L</span></div>
  </div>

  <div class="card">
    <div class="ct">Próximos alertas</div>
    ${prox.length?prox.map(a=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--br)">
      <div><div style="font-size:12px;color:${a.h<h?'var(--t3)':'var(--t)'};${a.h<h?'text-decoration:line-through':''}">${a.ti}</div><div style="font-size:10px;color:var(--t3)">${a.w}</div></div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:${a.h<=h?'var(--a)':'var(--aw)'};flex-shrink:0;margin-left:8px">${a.t}</div>
    </div>`).join(''):`<div style="font-size:12px;color:var(--t3);text-align:center;padding:8px">Dia concluído 🎉</div>`}
  </div>

  ${logs.length?`<div class="card"><div class="ct">Histórico recente</div>

function startBreath(){
  clearTimeout(bTimer);bStep=0;
  const steps=[{t:'Inspirar',d:4000,c:'expand'},{t:'Prender',d:7000,c:'hold'},{t:'Expirar',d:8000,c:''}];
  let sec=0,cur=0;
  function tick(){
    const s=steps[cur];
    const c=document.getElementById('bcirc');
    const bs=document.getElementById('bstate');
    const bc=document.getElementById('bcount');
    if(!c)return;
    c.className='bcirc '+(s.c||'');
    bs.textContent=s.t;
    const rem=Math.ceil((s.d-sec*1000)/1000);
    bc.textContent=rem+'s';
    sec++;
    if(sec*1000>=s.d){sec=0;cur=(cur+1)%3;}
    bTimer=setTimeout(tick,1000);
  }
  tick();
}
function stopBreath(){
  clearTimeout(bTimer);
  const c=document.getElementById('bcirc');const bs=document.getElementById('bstate');const bc=document.getElementById('bcount');
  if(c){c.className='bcirc';bs.textContent='Pronto';bc.textContent='4-7-8';}
}
